name: Release Firefox Add-on

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      zip-name: ${{ steps.zip.outputs.zip-name }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Firefox extension
        run: pnpm run zip:firefox

      - name: Find zip name
        id: zip
        run: |
          ZIP=$(ls .output/*.zip | head -1)
          echo "zip-name=$(basename $ZIP)" >> "$GITHUB_OUTPUT"
          echo "Found: $ZIP"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: apxm-firefox-release
          path: .output/*.zip
          retention-days: 90

      - name: Zip source code for Mozilla review
        run: git archive --output source.zip HEAD

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: apxm-firefox-source
          path: source.zip
          retention-days: 90

  submit:
    name: Submit to AMO
    needs: build
    environment: Firefox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apxm-firefox-release
          path: artifact

      - uses: actions/download-artifact@v4
        with:
          name: apxm-firefox-source
          path: source

      - name: Submit to Firefox Add-on Store
        run: npx web-ext@8 sign --channel listed --upload-source-code ../source/source.zip
        working-directory: artifact
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
