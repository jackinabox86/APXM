name: Build Firefox XPI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Firefox extension
        run: pnpm run build:firefox

      - name: Create XPI archive
        run: pnpm run zip:firefox

      - name: Debug - Check working directory and files
        run: |
          pwd
          ls -la .output/

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: apxm-firefox-xpi
          path: ${{ github.workspace }}/.output/apxm-*-firefox.zip
          if-no-files-found: warn
          retention-days: 30
